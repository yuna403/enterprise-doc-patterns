services:
  - type: web
    name: enterprise-doc-patterns-backend
    env: java
    region: oregon
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/enterprise-doc-patterns-1.0.jar
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: JAVA_VERSION
        value: "17"
